<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FHILAR - Transaction History</title>
  <link rel="stylesheet" href="transaction-history.css" />
  <link href="https://fonts.googleapis.com/css2?family=Didact+Gothic&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="app-layout">

    <!-- ── Sidebar ── -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <img src="../assets/images/sidebar-logo.jpg" alt="FHILAR Logo" class="sidebar-logo-img" />
      </div>

      <nav class="sidebar-nav">
        <button class="nav-btn" data-page="dashboard">DASHBOARD</button>
        <button class="nav-btn" data-page="product-management">PRODUCT<br>MANAGEMENT</button>
        <button class="nav-btn" data-page="product-information">PRODUCT<br>INFORMATION</button>
        <button class="nav-btn" data-page="size-management">SIZE MANAGEMENT</button>
        <button class="nav-btn" data-page="stocks">STOCKS</button>
        <button class="nav-btn" data-page="reports">REPORTS</button>
        <button class="nav-btn active" data-page="transaction-history">TRANSACTION<br>HISTORY</button>
        <button class="nav-btn" data-page="accounts">ACCOUNTS</button>
      </nav>
    </aside>

    <!-- ── Main Content ── -->
    <main class="main-content">
      <div class="dashboard-header">
        <h1 class="dash-title">Transaction History</h1>
        <p class="dash-subtitle">Forever Your Girl</p>
      </div>

      <!-- ── Summary Cards ── -->
      <div class="summary-row">
        <div class="summary-card">
          <p class="summary-label">Total Transactions</p>
          <p class="summary-value" id="sumTotal">0</p>
          <p class="summary-sub">all recorded transactions</p>
        </div>
        <div class="summary-card">
          <p class="summary-label">Total Sales</p>
          <p class="summary-value" id="sumSales">₱ 0.00</p>
          <p class="summary-sub">from sale transactions</p>
        </div>
        <div class="summary-card">
          <p class="summary-label">Total Units Moved</p>
          <p class="summary-value" id="sumUnits">0</p>
          <p class="summary-sub">quantity across all types</p>
        </div>
      </div>

      <!-- ── Add Transaction Panel ── -->
      <div class="txn-panel">
        <h2 class="panel-title">ADD TRANSACTION</h2>

        <div class="txn-fields-grid">

          <div class="field-group">
            <label class="field-label">PRODUCT:</label>
            <select class="mgmt-select" id="txnProduct">
              <option value="">-- select product --</option>
            </select>
          </div>

          <div class="field-group">
            <label class="field-label">SIZE:</label>
            <select class="mgmt-select" id="txnSize">
              <option value="">-- select size --</option>
            </select>
          </div>

          <div class="field-group">
            <label class="field-label">COLOR:</label>
            <input type="text" class="mgmt-input" id="txnColor" placeholder="color here" />
          </div>

          <div class="field-group">
            <label class="field-label">TYPE:</label>
            <select class="mgmt-select" id="txnType">
              <option value="">-- select type --</option>
              <option value="Sale">Sale</option>
              <option value="Restock">Restock</option>
              <option value="Adjustment">Adjustment</option>
              <option value="Return">Return</option>
            </select>
          </div>

          <div class="field-group">
            <label class="field-label">QUANTITY:</label>
            <input type="number" class="mgmt-input" id="txnQty" placeholder="0" min="1" />
          </div>

          <div class="field-group">
            <label class="field-label">AMOUNT (₱):</label>
            <input type="number" class="mgmt-input" id="txnAmount" placeholder="0.00" min="0" step="0.01" />
          </div>

          <div class="field-group">
            <label class="field-label">DATE:</label>
            <input type="date" class="mgmt-input" id="txnDate" />
          </div>

          <div class="field-group">
            <label class="field-label">NOTES:</label>
            <input type="text" class="mgmt-input" id="txnNotes" placeholder="optional notes" />
          </div>

        </div>

        <hr class="mgmt-divider" />

        <div class="txn-action-row">
          <div class="txn-btn-group">
            <button class="mgmt-btn" id="addTxnBtn">ADD TRANSACTION</button>
            <button class="mgmt-btn btn-secondary" id="clearTxnBtn">CLEAR</button>
          </div>
          <p class="feedback-msg" id="feedbackMsg"></p>
        </div>

      </div>

      <!-- ── Filter Panel ── -->
      <div class="filter-panel">

        <div class="filter-group">
          <label class="filter-label">PRODUCT:</label>
          <select class="filter-select" id="filterProduct">
            <option value="">All Products</option>
          </select>
        </div>

        <div class="filter-group">
          <label class="filter-label">TYPE:</label>
          <select class="filter-select" id="filterType">
            <option value="">All Types</option>
            <option value="Sale">Sale</option>
            <option value="Restock">Restock</option>
            <option value="Adjustment">Adjustment</option>
            <option value="Return">Return</option>
          </select>
        </div>

        <div class="filter-group">
          <label class="filter-label">FROM:</label>
          <input type="date" class="filter-input" id="filterFrom" />
        </div>

        <div class="filter-group">
          <label class="filter-label">TO:</label>
          <input type="date" class="filter-input" id="filterTo" />
        </div>

        <div class="filter-group">
          <label class="filter-label">SEARCH:</label>
          <input type="text" class="filter-input" id="filterSearch" placeholder="product, color…" />
        </div>

        <div class="filter-btn-group">
          <button class="mgmt-btn" id="applyFilterBtn">FILTER</button>
          <button class="mgmt-btn btn-secondary" id="resetFilterBtn">RESET</button>
        </div>

      </div>

      <!-- ── History Table ── -->
      <div class="history-table-wrap">
        <div class="table-header-row">
          <h2 class="table-title">All Transactions</h2>
          <button class="export-btn" id="exportCsvBtn">EXPORT CSV</button>
        </div>

        <table class="history-table" id="historyTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Date</th>
              <th>Product</th>
              <th>Size</th>
              <th>Color</th>
              <th>Type</th>
              <th>Qty</th>
              <th>Amount</th>
              <th>Notes</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="historyTableBody"></tbody>
        </table>

        <div class="pagination-row" id="paginationRow"></div>
      </div>

    </main>
  </div>

  <script src="transaction-history.js"></script>
</body>
</html>

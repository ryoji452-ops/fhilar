<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FHILAR - Reports</title>
  <link rel="stylesheet" href="reports.css" />
  <link href="https://fonts.googleapis.com/css2?family=Didact+Gothic&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="app-layout">

    <!-- ── Sidebar ── -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <img src="../assets/images/sidebar-logo.jpg" alt="FHILAR Logo" class="sidebar-logo-img" />
      </div>

      <nav class="sidebar-nav">
        <button class="nav-btn" data-page="dashboard">DASHBOARD</button>
        <button class="nav-btn" data-page="product-management">PRODUCT<br>MANAGEMENT</button>
        <button class="nav-btn" data-page="product-information">PRODUCT<br>INFORMATION</button>
        <button class="nav-btn" data-page="size-management">SIZE MANAGEMENT</button>
        <button class="nav-btn" data-page="stocks">STOCKS</button>
        <button class="nav-btn active" data-page="reports">REPORTS</button>
        <button class="nav-btn" data-page="transaction-history">TRANSACTION<br>HISTORY</button>
        <button class="nav-btn" data-page="accounts">ACCOUNTS</button>
      </nav>
    </aside>

    <!-- ── Main Content ── -->
    <main class="main-content">
      <div class="dashboard-header">
        <h1 class="dash-title">Reports</h1>
        <p class="dash-subtitle">Forever Your Girl</p>
      </div>

      <!-- ── Summary Cards ── -->
      <div class="summary-row">
        <div class="summary-card">
          <p class="summary-label">Total Products</p>
          <p class="summary-value" id="sumProducts">0</p>
          <p class="summary-sub">registered products</p>
        </div>
        <div class="summary-card">
          <p class="summary-label">Total Stock Units</p>
          <p class="summary-value" id="sumStocks">0</p>
          <p class="summary-sub">units across all items</p>
        </div>
        <div class="summary-card">
          <p class="summary-label">Low Stock Items</p>
          <p class="summary-value" id="sumLow">0</p>
          <p class="summary-sub">items with ≤ 5 units</p>
        </div>
      </div>

      <!-- ── Filter Panel ── -->
      <div class="filter-panel">

        <div class="filter-group">
          <label class="filter-label">PRODUCT:</label>
          <select class="filter-select" id="filterProduct">
            <option value="">All Products</option>
          </select>
        </div>

        <div class="filter-group">
          <label class="filter-label">SIZE:</label>
          <select class="filter-select" id="filterSize">
            <option value="">All Sizes</option>
          </select>
        </div>

        <div class="filter-group">
          <label class="filter-label">STATUS:</label>
          <select class="filter-select" id="filterStatus">
            <option value="">All</option>
            <option value="low">Low Stock</option>
            <option value="ok">OK</option>
          </select>
        </div>

        <div class="filter-group">
          <label class="filter-label">SEARCH:</label>
          <input type="text" class="filter-input" id="filterSearch" placeholder="product, size, color…" />
        </div>

        <div class="filter-btn-group">
          <button class="mgmt-btn" id="applyFilterBtn">FILTER</button>
          <button class="mgmt-btn btn-secondary" id="resetFilterBtn">RESET</button>
        </div>

      </div>

      <!-- ── Report Table ── -->
      <div class="report-table-wrap">
        <div class="table-header-row">
          <h2 class="table-title">Stock Report</h2>
          <button class="export-btn" id="exportCsvBtn">EXPORT CSV</button>
        </div>

        <table class="report-table" id="reportTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Product Name</th>
              <th>Size</th>
              <th>Color</th>
              <th>Quantity</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="reportTableBody"></tbody>
        </table>

        <div class="pagination-row" id="paginationRow"></div>
      </div>

    </main>
  </div>

  <script src="reports.js"></script>
</body>
</html>

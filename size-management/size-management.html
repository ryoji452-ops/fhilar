<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FHILAR - Size Management</title>
  <link rel="stylesheet" href="size-management.css" />
  <link href="https://fonts.googleapis.com/css2?family=Didact+Gothic&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="app-layout">

    <!-- ── Sidebar ── -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <img src="../assets/images/sidebar-logo.jpg" alt="FHILAR Logo" class="sidebar-logo-img" />
      </div>

      <nav class="sidebar-nav">
        <button class="nav-btn" data-page="dashboard">DASHBOARD</button>
        <button class="nav-btn" data-page="product-management">PRODUCT<br>MANAGEMENT</button>
        <button class="nav-btn" data-page="product-information">PRODUCT<br>INFORMATION</button>
        <button class="nav-btn active" data-page="size-management">SIZE MANAGEMENT</button>
        <button class="nav-btn" data-page="stocks">STOCKS</button>
        <button class="nav-btn" data-page="reports">REPORTS</button>
        <button class="nav-btn" data-page="transaction-history">TRANSACTION<br>HISTORY</button>
        <button class="nav-btn" data-page="accounts">ACCOUNTS</button>
      </nav>
    </aside>

    <!-- ── Main Content ── -->
    <main class="main-content">
      <div class="dashboard-header">
        <h1 class="dash-title">Size Management</h1>
        <p class="dash-subtitle">Forever Your Girl</p>
      </div>

      <!-- ── Management Panel ── -->
      <div class="mgmt-panel">

        <!-- Top Row: Add + Edit -->
        <div class="mgmt-row">

          <!-- ADD SIZE -->
          <div class="mgmt-section">
            <h2 class="mgmt-label">ADD SIZE:</h2>
            <input type="text" class="mgmt-input" id="addInput" placeholder="add size here (e.g. S, M, L, XL)" />
            <button class="mgmt-btn" id="addBtn">ADD</button>
          </div>

          <!-- EDIT SIZE -->
          <div class="mgmt-section">
            <h2 class="mgmt-label">EDIT SIZE:</h2>
            <input type="text" class="mgmt-input" id="editInput" placeholder="OldSize > NewSize" />
            <button class="mgmt-btn" id="editBtn">EDIT</button>
          </div>

        </div>

        <!-- Divider -->
        <hr class="mgmt-divider" />

        <!-- Bottom Row: Delete + View -->
        <div class="mgmt-row">

          <!-- DELETE SIZE -->
          <div class="mgmt-section">
            <h2 class="mgmt-label">DELETE SIZE:</h2>
            <input type="text" class="mgmt-input" id="deleteInput" placeholder="size to delete" />
            <button class="mgmt-btn" id="deleteBtn">DELETE</button>
          </div>

          <!-- VIEW SIZES -->
          <div class="mgmt-section mgmt-section--view">
            <button class="mgmt-btn btn-view" id="viewBtn">VIEW SIZES</button>
          </div>

        </div>

        <!-- Feedback message -->
        <p class="feedback-msg" id="feedbackMsg"></p>

      </div>

      <!-- ── Sizes Table (shown after VIEW) ── -->
      <div class="sizes-table-wrap" id="sizesTableWrap" style="display:none;">
        <h2 class="table-title">All Sizes</h2>
        <table class="sizes-table" id="sizesTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Size</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="sizesTableBody">
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <script src="size-management.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FHILAR - Stocks</title>
  <link rel="stylesheet" href="stocks.css" />
  <link href="https://fonts.googleapis.com/css2?family=Didact+Gothic&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="app-layout">

    <!-- ── Sidebar ── -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <img src="../assets/images/sidebar-logo.jpg" alt="FHILAR Logo" class="sidebar-logo-img" />
      </div>

      <nav class="sidebar-nav">
        <button class="nav-btn" data-page="dashboard">DASHBOARD</button>
        <button class="nav-btn" data-page="product-management">PRODUCT<br>MANAGEMENT</button>
        <button class="nav-btn" data-page="product-information">PRODUCT<br>INFORMATION</button>
        <button class="nav-btn" data-page="size-management">SIZE MANAGEMENT</button>
        <button class="nav-btn active" data-page="stocks">STOCKS</button>
        <button class="nav-btn" data-page="reports">REPORTS</button>
        <button class="nav-btn" data-page="transaction-history">TRANSACTION<br>HISTORY</button>
        <button class="nav-btn" data-page="accounts">ACCOUNTS</button>
      </nav>
    </aside>

    <!-- ── Main Content ── -->
    <main class="main-content">
      <div class="dashboard-header">
        <h1 class="dash-title">Stocks</h1>
        <p class="dash-subtitle">Forever Your Girl</p>
      </div>

      <!-- ── Stocks Panel ── -->
      <div class="stocks-panel">

        <!-- Fields: Product, Size, Color, Quantity -->
        <div class="stocks-fields-grid">

          <div class="field-group">
            <label class="field-label">PRODUCT NAME:</label>
            <select class="mgmt-select" id="productSelect">
              <option value="">-- select product --</option>
            </select>
          </div>

          <div class="field-group">
            <label class="field-label">SIZE:</label>
            <select class="mgmt-select" id="sizeSelect">
              <option value="">-- select size --</option>
            </select>
          </div>

          <div class="field-group">
            <label class="field-label">COLOR:</label>
            <input type="text" class="mgmt-input" id="colorInput" placeholder="color here" />
          </div>

          <div class="field-group">
            <label class="field-label">QUANTITY:</label>
            <input type="number" class="mgmt-input" id="quantityInput" placeholder="0" min="0" />
          </div>

        </div>

        <!-- Divider -->
        <hr class="mgmt-divider" />

        <!-- Action Row -->
        <div class="stocks-action-row">

          <div class="stocks-btn-group">
            <button class="mgmt-btn" id="addStockBtn">ADD</button>
            <button class="mgmt-btn" id="clearBtn">CLEAR</button>
          </div>

          <div class="stocks-view-group">
            <button class="mgmt-btn btn-view" id="viewBtn">VIEW STOCKS</button>
          </div>

        </div>

        <!-- Feedback -->
        <p class="feedback-msg" id="feedbackMsg"></p>

      </div>

      <!-- ── Stocks Table ── -->
      <div class="stocks-table-wrap" id="stocksTableWrap" style="display:none;">
        <div class="table-header-row">
          <h2 class="table-title">All Stocks</h2>
          <input type="text" class="table-search" id="tableSearch" placeholder="Search product, size, color…" />
        </div>
        <table class="stocks-table" id="stocksTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Product Name</th>
              <th>Size</th>
              <th>Color</th>
              <th>Quantity</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="stocksTableBody"></tbody>
        </table>
      </div>

    </main>
  </div>

  <script src="stocks.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FHILAR - Product Management</title>
  <link rel="stylesheet" href="product-management.css" />
  <link href="https://fonts.googleapis.com/css2?family=Didact+Gothic&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="app-layout">

    <!-- ── Sidebar ── -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-crop" id="logoCrop"></div>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-btn" data-page="dashboard">DASHBOARD</button>
        <button class="nav-btn active" data-page="product-management">PRODUCT<br>MANAGEMENT</button>
        <button class="nav-btn" data-page="product-information">PRODUCT<br>INFORMATION</button>
        <button class="nav-btn" data-page="size-management">SIZE MANAGEMENT</button>
        <button class="nav-btn" data-page="stocks">STOCKS</button>
        <button class="nav-btn" data-page="reports">REPORTS</button>
        <button class="nav-btn" data-page="transaction-history">TRANSACTION<br>HISTORY</button>
        <button class="nav-btn" data-page="accounts">ACCOUNTS</button>
      </nav>
    </aside>

    <!-- ── Main Content ── -->
    <main class="main-content">
      <div class="dashboard-header">
        <h1 class="dash-title">Product Management</h1>
        <p class="dash-subtitle">Forever Your Girl</p>
      </div>

      <!-- ── Management Panel ── -->
      <div class="mgmt-panel">

        <!-- Top Row: Add + Edit -->
        <div class="mgmt-row">

          <!-- ADD PRODUCT -->
          <div class="mgmt-section">
            <h2 class="mgmt-label">ADD PRODUCT:</h2>
            <input type="text" class="mgmt-input" id="addInput" placeholder="add product here" />
            <button class="mgmt-btn" id="addBtn">ADD</button>
          </div>

          <!-- EDIT PRODUCT -->
          <div class="mgmt-section">
            <h2 class="mgmt-label">EDIT PRODUCT:</h2>
            <input type="text" class="mgmt-input" id="editInput" placeholder="edit product here" />
            <button class="mgmt-btn" id="editBtn">EDIT</button>
          </div>

        </div>

        <!-- Divider -->
        <hr class="mgmt-divider" />

        <!-- Bottom Row: Delete + View -->
        <div class="mgmt-row">

          <!-- DELETE PRODUCT -->
          <div class="mgmt-section">
            <h2 class="mgmt-label">DELETE PRODUCT:</h2>
            <input type="text" class="mgmt-input" id="deleteInput" placeholder="delete product here" />
            <button class="mgmt-btn" id="deleteBtn">DELETE</button>
          </div>

          <!-- VIEW PRODUCTS -->
          <div class="mgmt-section mgmt-section--view">
            <button class="mgmt-btn btn-view" id="viewBtn">VIEW PRODUCTS</button>
          </div>

        </div>

        <!-- Feedback message -->
        <p class="feedback-msg" id="feedbackMsg"></p>

      </div>

      <!-- ── Products Table (shown after VIEW) ── -->
      <div class="products-table-wrap" id="productsTableWrap" style="display:none;">
        <h2 class="table-title">All Products</h2>
        <table class="products-table" id="productsTable">
          <thead>
            <tr>
              <th>#</th>
              <th>Product Name</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="productsTableBody">
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <script src="product-managemet.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FHILAR - Register</title>
  <link rel="stylesheet" href="register.css" />
  <link href="https://fonts.googleapis.com/css2?family=Didact+Gothic&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet"/>
</head>
<body>

  <div class="container">
    <div class="logo-circle">
      <img src="../assets/images/fhilar.jpg" alt="FHILAR Logo" class="logo-img" />
    </div>

    <div class="form-box">
      <h2 class="form-title">REGISTER ACCOUNT</h2>

      <div class="fields-grid">
        <div class="field-group">
          <label for="name">NAME:</label>
          <input type="text" id="name" placeholder="" />
        </div>

        <div class="field-group">
          <label>USER TYPE:</label>
          <div class="choice-group">
            <button class="choice-btn" data-value="admin">ADMIN</button>
            <button class="choice-btn" data-value="user">STAFF</button>
          </div>
          <input type="hidden" id="userType" />
        </div>

        <div class="field-group">
          <label for="password">PASSWORD:</label>
          <input type="password" id="password" placeholder="" />
        </div>

        <div class="field-group">
          <label for="email">EMAIL:</label>
          <input type="email" id="email" placeholder="" />
        </div>
      </div>

      <p class="error-msg" id="errorMsg"></p>
      <p class="success-msg" id="successMsg"></p>

      <div class="btn-row">
        <button class="btn" id="enterBtn">ENTER</button>
        <button class="btn" id="clearBtn">CLEAR</button>
      </div>

      <div class="return-row">
        <button class="btn-return" id="returnBtn">&#8592; Return to Login</button>
      </div>
    </div>
  </div>

  <script src="register.js"></script>
</body>
</html>
